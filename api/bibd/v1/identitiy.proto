syntax = "proto3";
option go_package = "github.com/bencoepp/bib/internal/pb/bibd/v1;bibv1";

package bibd.v1;

// Basic geographic/location snapshot (optional)
message Location {
  string country = 1;
  string country_code = 2;
  string region = 3;
  string region_name = 4;
  string city = 5;
  string zip = 6;
  double latitude = 7;
  double longitude = 8;
  string timezone = 9;
  string isp = 10;
  string org = 11;
  string asn = 12;
  string ip = 13; // textual representation
}

// Identity metadata payload (signed)
message IdentityPayload {
  string id = 1;
  string kind = 2;       // "daemon" | "user"
  bytes  public_key = 3; // Ed25519 public key (32 bytes)
  string hostname = 4;
  string version = 5;
  string first_name = 6; // only for user identities
  string last_name = 7;
  string email = 8;
  Location location = 9;
  string created_at = 10; // RFC3339Nano
}

// SignedEnvelope equivalent
message SignedEnvelope {
  string id = 1;
  bytes  public_key = 2; // optional; empty means resolve from registry
  string alg = 3;        // "Ed25519"
  string payload_type = 4; // e.g. "IdentityPayload" | "RotationLinkPayload"
  bytes  payload_bytes = 5; // canonical JSON bytes used for signing
  bytes  signature = 6;     // raw signature
  string timestamp = 7;     // RFC3339Nano of envelope creation
}

// Rotation link payload (signed by old and new keys separately)
message RotationLinkPayload {
  string old_id = 1;
  string new_id = 2;
  bytes  old_public_key = 3;
  bytes  new_public_key = 4;
  string timestamp = 5; // RFC3339Nano
  bytes  sig_old = 6;
  bytes  sig_new = 7;
}

// Signed transparency log root (commitment)
message SignedLogRoot {
  uint64 tree_size = 1;
  bytes  root_hash = 2;
  string timestamp = 3;     // RFC3339Nano
  bytes  signature = 4;
  bytes  log_public_key = 5;
  string log_key_id = 6;    // hex(hash(log_public_key))
}

// Inclusion proof (Merkle sibling path)
message InclusionProof {
  uint64 leaf_index = 1;
  bytes  leaf_hash = 2;
  repeated bytes siblings = 3;
  SignedLogRoot signed_root = 4;
}

// Registration proof bundles identity + inclusion
message RegistrationProof {
  IdentityPayload identity = 1;
  InclusionProof inclusion = 2;
}

// --- RPC Requests/Responses ---

message PublishIdentityRequest {
  SignedEnvelope envelope = 1; // envelope whose payload_type == "IdentityPayload"
}

message PublishIdentityResponse {
  RegistrationProof proof = 1;
}

message RetrieveIdentityRequest {
  string id = 1;
}

message RetrieveIdentityResponse {
  IdentityPayload identity = 1;
  RegistrationProof latest_proof = 2;
}

message RetrieveIdentitiesRequest {
  string kind = 1;     // optional filter
  uint32 limit = 2;     // page size
  string page_token = 3;
}

message IdentitySummary {
  string id = 1;
  string kind = 2;
  string hostname = 3;
  string version = 4;
  string email = 5;
}

message RetrieveIdentitiesResponse {
  repeated IdentitySummary identities = 1;
  string next_page_token = 2;
}

message SubmitRotationLinkRequest {
  SignedEnvelope envelope = 1; // payload_type == "RotationLinkPayload"
}

message SubmitRotationLinkResponse {
  RegistrationProof proof = 1;
}

message GetLogRootRequest {}
message GetLogRootResponse {
  SignedLogRoot signed_root = 1;
}

// NEW: request/response for local daemon identity
message GetSelfIdentityRequest {}
message GetSelfIdentityResponse {
  IdentityPayload identity = 1;
  RegistrationProof latest_proof = 2;
  // Optionally you could add: SignedEnvelope signed_envelope = 3;
}

// Service definition
service IdentityService {
  rpc PublishIdentity(PublishIdentityRequest) returns (PublishIdentityResponse);
  rpc RetrieveIdentity(RetrieveIdentityRequest) returns (RetrieveIdentityResponse);
  rpc RetrieveIdentities(RetrieveIdentitiesRequest) returns (RetrieveIdentitiesResponse);
  rpc SubmitRotationLink(SubmitRotationLinkRequest) returns (SubmitRotationLinkResponse);
  rpc GetLogRoot(GetLogRootRequest) returns (GetLogRootResponse);
  rpc GetSelfIdentity(GetSelfIdentityRequest) returns (GetSelfIdentityResponse); // NEW
}